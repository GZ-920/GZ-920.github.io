<!DOCTYPE html>
<html lang="zh">
<head>
<link rel="shortcut icon" href="favicon.ico">
<meta charset="UTF-8">
<title>作业管家</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#ffffff;
height:100vh;
display:flex;
flex-direction:column;
}

/* 主界面 */

.container{
flex:1;
padding:20px;
box-sizing:border-box;
display:flex;
}

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:20px;
}

.card{
background:#f7f3e9;
border-radius:35px;
padding:20px;
position:relative;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.homework-text{
margin-top:15px;
font-size:24px;
line-height:1.6;
}

.add-btn{
position:absolute;
right:20px;
bottom:20px;
width:40px;
height:40px;
border-radius:12px;
border:none;
background:#e9e26b;
font-size:20px;
cursor:pointer;
}

/* 编辑窗口 */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal{
background:#f5f5f5;
width:80%;
max-width:900px;
border-radius:25px;
padding:25px;
display:flex;
gap:20px;
animation:popUp 0.25s ease;
}

@keyframes popUp{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.left{flex:2;}

.right{
flex:1;
background:#e6e3bd;
padding:15px;
border-radius:20px;
display:flex;
flex-direction:column;
height:500px;
}

.input-row{
display:flex;
align-items:center;
margin-bottom:12px;
}

.input-row span{
width:30px;
font-weight:bold;
}

.input-row input{
flex:1;
padding:10px 12px;
border:none;
border-radius:15px;
background:#ffffff;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 行操作 */

.row-actions{
margin-left:6px;
}

.row-actions button{
border:none;
background:#ffb3b3;
border-radius:8px;
cursor:pointer;
padding:4px 6px;
}

.plus-row{
text-align:center;
margin-top:10px;
}

.plus-row button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:12px;
background:#e9e26b;
cursor:pointer;
}

/* 分类标签 */

.word-tabs{
display:flex;
gap:6px;
margin-bottom:8px;
}

.word-tabs button{
flex:1;
border:none;
border-radius:8px;
padding:4px;
cursor:pointer;
background:#d9d6a6;
}

/* 词库 */

.quick-words{
flex:1;
overflow-y:auto;
display:flex;
flex-wrap:wrap;
gap:6px;
padding-right:4px;
}

.quick-words button{
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

/* 小键盘 */

.keypad{
margin-top:10px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.keypad button{
border:none;
border-radius:6px;
padding:8px;
cursor:pointer;
}

/* 底部按钮 */

.bottom-btns{
margin-top:10px;
text-align:right;
}

.bottom-btns button{
padding:6px 12px;
border:none;
border-radius:12px;
cursor:pointer;
}

/* 操作说明按钮 */

.help-btn{
position:fixed;
right:20px;
bottom:20px;
background:#6bc5e9;
border:none;
border-radius:20px;
padding:10px 16px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* 说明窗口 */

.help-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:600px;
max-height:80vh;
overflow:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
}

</style>
</head>

<body>

<div class="container">
<div class="grid" id="subjectGrid"></div>
</div>

<!-- 编辑窗口 -->

<div class="overlay" id="overlay">

<div class="modal">

<div class="left">

<h2 id="editorTitle"></h2>

<div id="inputArea"></div>

<div class="plus-row">
<button onclick="addInput()">＋再布一项</button>
<button onclick="deleteCurrent()">删除本项</button>
<button onclick="clearSubject()">清空本科</button>
</div>

</div>

<div class="right">

<h3>快捷选词</h3>

<div class="word-tabs">
<button onclick="loadWords('task')">内容</button>
<button onclick="loadWords('time')">时间</button>
<button onclick="loadWords('action')">动作</button>
<button onclick="loadWords('logic')">逻辑</button>
</div>

<div class="quick-words" id="quickWords"></div>

<div class="keypad" id="keypad"></div>

<div class="bottom-btns">
<button onclick="closeModal()">取消</button>
<button onclick="saveHomework()">完成</button>
</div>

</div>

</div>
</div>

<!-- 操作说明 -->

<button class="help-btn" onclick="toggleHelp()">操作说明开/关</button>

<div class="help-box" id="helpBox"></div>

<script>

/* 学科 */

const subjects=["语文","数学","英语","政治","历史","地理"]

let currentSubject=null
let selectedInput=null
let homeworkData=JSON.parse(localStorage.getItem("homeworkData"))||{}

const grid=document.getElementById("subjectGrid")

subjects.forEach(sub=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<h3>${sub}</h3>
<div class="homework-text" id="hw-${sub}"></div>
<button class="add-btn" onclick="openEditor('${sub}')">+</button>
`

grid.appendChild(card)

renderHomework(sub)

})

/* 显示作业 */

function renderHomework(subject){

const display=document.getElementById("hw-"+subject)

if(homeworkData[subject]){

display.innerHTML=homeworkData[subject]
.map((t,i)=>`${i+1}. ${t}`)
.join("<br>")

}

}

/* 打开编辑 */

function openEditor(subject){

currentSubject=subject

document.getElementById("editorTitle").innerText=subject+" 作业布置"

document.getElementById("overlay").style.display="flex"

document.getElementById("inputArea").innerHTML=""

if(homeworkData[subject]){

homeworkData[subject].forEach(t=>addInput(t))

}else{

addInput()

}

}

/* 关闭 */

function closeModal(){

document.getElementById("overlay").style.display="none"

}

/* 新增输入 */

function addInput(text=""){

const area=document.getElementById("inputArea")

const index=area.children.length+1

const row=document.createElement("div")

row.className="input-row"

row.innerHTML=`
<span>${index}</span>
<input type="text" value="${text}">
`

area.appendChild(row)

const input=row.querySelector("input")

selectedInput=input
input.focus()

input.onclick=()=>selectedInput=input
input.onfocus=()=>selectedInput=input

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
addInput()
}
})

}

/* 删除当前 */

function deleteCurrent(){

if(!selectedInput) return

selectedInput.parentElement.remove()

updateNumbers()

}

/* 更新序号 */

function updateNumbers(){

document.querySelectorAll("#inputArea .input-row")
.forEach((r,i)=>{

r.querySelector("span").innerText=i+1

})

}

/* 清空 */

function clearSubject(){

if(confirm("确定清空当前学科作业？")){

document.getElementById("inputArea").innerHTML=""

addInput()

}

}

/* 光标插入 */

function insertText(text){

if(!selectedInput) return

let start=selectedInput.selectionStart
let end=selectedInput.selectionEnd

let value=selectedInput.value

selectedInput.value=
value.substring(0,start)+
text+
value.substring(end)

let pos=start+text.length

selectedInput.focus()
selectedInput.setSelectionRange(pos,pos)

}

/* 删除字符 */

function deleteChar(){

if(!selectedInput) return

let start=selectedInput.selectionStart
let value=selectedInput.value

if(start>0){

selectedInput.value=
value.substring(0,start-1)+
value.substring(start)

selectedInput.setSelectionRange(start-1,start-1)

}

}

/* 保存 */

function saveHomework(){

const inputs=document.querySelectorAll("#inputArea input")

let arr=[]

inputs.forEach(i=>{
if(i.value.trim()) arr.push(i.value)
})

homeworkData[currentSubject]=arr

localStorage.setItem(
"homeworkData",
JSON.stringify(homeworkData)
)

renderHomework(currentSubject)

closeModal()

}

/* 快捷词 */

const wordCategories={

task:["校本","试卷","A本","B本","课本","听力","阅读理解","A篇","B篇","C篇","D篇","完形填空","七选五","读后续写","默写","听写","思维导图"],

time:["明天","今天","后天","这周","下周","月","日","之前","之后"],

action:["完成","预习","复习","背诵","整理","熟读","过关","订正","提交"],

logic:["第","和","或","除了","都","，","。"]

}

function loadWords(type){

const area=document.getElementById("quickWords")

area.innerHTML=""

wordCategories[type].forEach(w=>{

const btn=document.createElement("button")

btn.innerText=w

btn.onclick=()=>insertText(w)

area.appendChild(btn)

})

}

loadWords("task")

/* 小键盘 */

const keys=[
"1","2","3","第","题",
"4","5","6","，","课",
"7","8","9",".","面",
"P","0","~","+","篇",
"←","空格"
]

keys.forEach(k=>{

const btn=document.createElement("button")

btn.innerText=k

btn.onclick=()=>{

if(k==="←") deleteChar()
else if(k==="空格") insertText(" ")
else insertText(k)

}

document.getElementById("keypad").appendChild(btn)

})

/* Markdown说明 */

const helpMD=`

# 作业管家操作说明（V1.1.0_20260310）

## 重大更新！
- 小键盘增加←（删除键）和空格键
- 按下回车键自动新增一项作业
- 插入快捷词汇位置可以在任意位置插入
- 新增操作说明
- 新增“＋再布一项” “删除本项” “清空本科”按钮

## 基本操作
- 点击学科 + 布置作业
- 每行是一条作业
- Enter 自动新增一行

## 快捷输入
- 右侧快捷词快速输入
- 小键盘输入数字和符号
- 插入位置为光标位置

## 编辑
- 删除当前：删除当前行
- 清空本科：清空当前学科

## 保存
点击完成自动保存
`

function parseMarkdown(md){

return md
.replace(/^# (.*$)/gim,"<h2>$1</h2>")
.replace(/^## (.*$)/gim,"<h3>$1</h3>")
.replace(/^- (.*$)/gim,"<li>$1</li>")
.replace(/\n/g,"<br>")

}

function toggleHelp(){

const box=document.getElementById("helpBox")

if(box.style.display==="block"){

box.style.display="none"

}else{

box.innerHTML=parseMarkdown(helpMD)

box.style.display="block"

}

}

/* Ctrl快捷学科 */

document.addEventListener("keydown",e=>{

if(e.ctrlKey){

let num=parseInt(e.key)

if(num>=1 && num<=6){

openEditor(subjects[num-1])

}

}

})
</script>

</body>
</html>
