<!DOCTYPE html>
<html lang="zh">
<head>
<link rel="shortcut icon" href="favicon.ico">
<meta charset="UTF-8">
<title>作业管家</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#ffffff;
height:100vh;
display:flex;
flex-direction:column;
}

/* 主界面 */

.container{
flex:1;
padding:20px;
box-sizing:border-box;
display:flex;
}

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:20px;
}

.card{
background:#f7f3e9;
border-radius:35px;
padding:20px;
position:relative;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.homework-text{
margin-top:15px;
font-size:24px;
line-height:1.6;
}

.add-btn{
position:absolute;
right:20px;
bottom:20px;
width:40px;
height:40px;
border-radius:12px;
border:none;
background:#e9e26b;
font-size:20px;
cursor:pointer;
}

/* 编辑窗口 */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal{
background:#f5f5f5;
width:80%;
max-width:900px;
border-radius:25px;
padding:25px;
display:flex;
gap:20px;
animation:popUp 0.25s ease;
}

@keyframes popUp{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.left{flex:2;}

.right{
flex:1;
background:#e6e3bd;
padding:15px;
border-radius:20px;
display:flex;
flex-direction:column;
height:500px;
}

.input-row{
display:flex;
align-items:center;
margin-bottom:12px;
}

.input-row span{
width:30px;
font-weight:bold;
}

.input-row input{
flex:1;
padding:10px 12px;
border:none;
border-radius:15px;
background:#ffffff;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row-actions{
margin-left:6px;
}

.row-actions button{
border:none;
background:#ffb3b3;
border-radius:8px;
cursor:pointer;
padding:4px 6px;
}

.plus-row{
text-align:center;
margin-top:10px;
}

.plus-row button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:12px;
background:#e9e26b;
cursor:pointer;
}

.word-tabs{
display:flex;
gap:6px;
margin-bottom:8px;
}

.word-tabs button{
flex:1;
border:none;
border-radius:8px;
padding:4px;
cursor:pointer;
background:#d9d6a6;
}

.quick-words{
flex:1;
overflow-y:auto;
display:flex;
flex-wrap:wrap;
gap:6px;
padding-right:4px;
}

.quick-words button{
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.keypad{
margin-top:10px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.keypad button{
border:none;
border-radius:6px;
padding:8px;
cursor:pointer;
}

.bottom-btns{
margin-top:10px;
text-align:right;
}

.bottom-btns button{
padding:6px 12px;
border:none;
border-radius:12px;
cursor:pointer;
}

.help-btn{
position:fixed;
right:20px;
bottom:20px;
background:#6bc5e9;
border:none;
border-radius:20px;
padding:10px 16px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.help-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:600px;
max-height:80vh;
overflow:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
}

</style>
</head>

<body>

<div class="container">
<div class="grid" id="subjectGrid"></div>
</div>

<div class="overlay" id="overlay">
<div class="modal">

<div class="left">
<h2 id="editorTitle"></h2>
<div id="inputArea"></div>

<div class="plus-row">
<button onclick="addInput()">＋再布一项</button>
<button onclick="deleteCurrent()">删除本项</button>
<button onclick="clearSubject()">清空本科</button>
</div>
</div>

<div class="right">

<h3>快捷选词</h3>

<div class="word-tabs">
<button onclick="loadWords('task')">内容</button>
<button onclick="loadWords('time')">时间</button>
<button onclick="loadWords('action')">动作</button>
<button onclick="loadWords('logic')">逻辑</button>
</div>

<div class="quick-words" id="quickWords"></div>

<div class="keypad" id="keypad"></div>

<div class="bottom-btns">
<button onclick="closeModal()">取消</button>
<button onclick="saveHomework()">完成</button>
</div>

</div>

</div>
</div>

<button class="help-btn" onclick="toggleHelp()">操作说明</button>
<div class="help-box" id="helpBox"></div>

<script>

/* JSONBin配置 */

const BIN_ID="69b5820fb7ec241ddc6a7aef"
const API_KEY="$2a$10$OOK6/nrsFdOK0TS5TkVfme3FyQ5UipYDtxIPqYFgdHxDUa1pDEfFi"

/* 云端保存 */

async function saveOnline(){

try{

await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify(homeworkData)
})

}catch(e){
console.log("云保存失败",e)
}

}

/* 云端读取 */

async function loadOnline(){

try{

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`)
const data=await res.json()

homeworkData=data.record

localStorage.setItem("homeworkData",JSON.stringify(homeworkData))

subjects.forEach(renderHomework)

}catch(e){
console.log("云读取失败")
}

}

/* 学科 */

const subjects=["语文","数学","英语","政治","历史","地理"]

let currentSubject=null
let selectedInput=null
let homeworkData=JSON.parse(localStorage.getItem("homeworkData"))||{}

const grid=document.getElementById("subjectGrid")

subjects.forEach(sub=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<h3>${sub}</h3>
<div class="homework-text" id="hw-${sub}"></div>
<button class="add-btn" onclick="openEditor('${sub}')">+</button>
`

grid.appendChild(card)

renderHomework(sub)

})

function renderHomework(subject){

const display=document.getElementById("hw-"+subject)

if(homeworkData[subject]){

display.innerHTML=homeworkData[subject]
.map((t,i)=>`${i+1}. ${t}`)
.join("<br>")

}

}

function openEditor(subject){

currentSubject=subject

document.getElementById("editorTitle").innerText=subject+" 作业布置"

document.getElementById("overlay").style.display="flex"

document.getElementById("inputArea").innerHTML=""

if(homeworkData[subject]){

homeworkData[subject].forEach(t=>addInput(t))

}else{
addInput()
}

}

function closeModal(){
document.getElementById("overlay").style.display="none"
}

function addInput(text=""){

const area=document.getElementById("inputArea")
const index=area.children.length+1

const row=document.createElement("div")
row.className="input-row"

row.innerHTML=`
<span>${index}</span>
<input type="text" value="${text}">
`

area.appendChild(row)

const input=row.querySelector("input")

selectedInput=input
input.focus()

input.onclick=()=>selectedInput=input
input.onfocus=()=>selectedInput=input

}

function deleteCurrent(){

if(!selectedInput) return
selectedInput.parentElement.remove()
updateNumbers()

}

function updateNumbers(){

document.querySelectorAll("#inputArea .input-row")
.forEach((r,i)=>{

r.querySelector("span").innerText=i+1

})

}

function clearSubject(){

if(confirm("确定清空当前学科作业？")){
document.getElementById("inputArea").innerHTML=""
addInput()
}

}

function saveHomework(){

const inputs=document.querySelectorAll("#inputArea input")
let arr=[]

inputs.forEach(i=>{
if(i.value.trim()) arr.push(i.value)
})

homeworkData[currentSubject]=arr

localStorage.setItem("homeworkData",JSON.stringify(homeworkData))

renderHomework(currentSubject)

saveOnline()

closeModal()

}

window.onload=loadOnline

/* 插入文本 */

function insertText(text){

if(!selectedInput) return

const start=selectedInput.selectionStart
const end=selectedInput.selectionEnd
const value=selectedInput.value

selectedInput.value=value.slice(0,start)+text+value.slice(end)

selectedInput.selectionStart=
selectedInput.selectionEnd=start+text.length

selectedInput.focus()

}

function deleteChar(){

if(!selectedInput) return

const pos=selectedInput.selectionStart

if(pos>0){

selectedInput.value=
selectedInput.value.slice(0,pos-1)+
selectedInput.value.slice(pos)

selectedInput.selectionStart=
selectedInput.selectionEnd=pos-1

}

}

/* 快捷词 */

const wordCategories={
task:["校本","试卷","A本","B本","课本","听力","阅读理解","A篇","B篇","C篇","D篇","完形填空","七选五","读后续写","默写","听写","思维导图"],
time:["明天","今天","后天","这周","下周","月","日","之前","之后"],
action:["完成","预习","复习","背诵","整理","熟读","过关","订正","提交"],
logic:["第","和","或","除了","都","，","。"]
}

function loadWords(type){

const area=document.getElementById("quickWords")
area.innerHTML=""

wordCategories[type].forEach(w=>{

const btn=document.createElement("button")
btn.innerText=w
btn.onclick=()=>insertText(w)

area.appendChild(btn)

})

}

loadWords("task")

/* 小键盘 */

const keys=[
"1","2","3","第","题",
"4","5","6","，","课",
"7","8","9",".","面",
"P","0","~","+","篇",
"←","空格"
]

keys.forEach(k=>{

const btn=document.createElement("button")
btn.innerText=k

btn.onclick=()=>{

if(k==="←") deleteChar()
else if(k==="空格") insertText(" ")
else insertText(k)

}

document.getElementById("keypad").appendChild(btn)

})

/* 操作说明 */

function toggleHelp(){

const box=document.getElementById("helpBox")

if(box.style.display==="block"){
box.style.display="none"
return
}

box.innerHTML=`

<h2>作业管家使用说明</h2>

<h3>布置作业</h3>

<p>点击学科右下角 + 打开布置界面</p>

<h3>快捷输入</h3>

<p>右侧可点击词库或数字键盘快速输入</p>

<h3>键盘操作</h3>

<p>Enter 可快速新增一行作业</p>

<h3>管理作业</h3>

<ul>
<li>删除本项：删除当前输入行</li>
<li>清空本科：删除该学科所有作业</li>
</ul>

<h3>数据保存</h3>

<p>本地 + 云端自动同步</p>

`

box.style.display="block"

}

</script>

</body>
</html>
